{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}Вход{% endblock %}

{% block content %}
    <h1>Вход</h1>
    <div class="row">
        <div class="col-md-6 mx-auto">
            <form method="post">
                {% csrf_token %}
                {% bootstrap_form form %}
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
        </div>
    </div>
{% endblock %}
